<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Erkek Fikstür | Athlete.OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { background: #05070a; color: white; font-family: 'Lexend'; padding: 40px 5%; }
        .nav-back { text-decoration: none; color: #00d2ff; font-weight: 800; margin-bottom: 30px; display: inline-block; }
        .match-card { background: #111; padding: 20px; border-radius: 15px; margin-bottom: 12px; display: grid; grid-template-columns: 80px 180px 100px 1fr 1fr; align-items: center; border: 1px solid #222; }
        .time { color: #00d2ff; font-weight: 900; }
        .tag { background: rgba(0,210,255,0.1); color: #00d2ff; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; text-align: center; border: 1px solid #00d2ff; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 12px; margin: 20px 0; }
    </style>
</head>
<body>
    <a href="index1.html" class="nav-back">← DASHBOARD'A DÖN</a>
    <h1>ERKEK ALTYAPI MAÇLARI</h1>
    <input type="text" id="search" placeholder="Kendi takımını veya salonu ara..." onkeyup="filter()">
    
    <div id="list">
        <!-- 2 NİSAN VERİLERİ -->
        <div class="match-card">
            <span class="time">17:00</span>
            <span style="font-size:0.8rem">BGM SALON C2</span>
            <span class="tag">U18EA</span>
            <b>İSTANBUL BBSK (B)</b>
            <b>SUADİYE BASKETBOL (A)</b>
        </div>
        <div class="match-card">
            <span class="time">18:30</span>
            <span style="font-size:0.8rem">BGM SALON C3</span>
            <span class="tag">U18EA</span>
            <b>TİTAN AKADEMİ (A)</b>
            <b>AKADEMİ İSTANBUL (A)</b>
        </div>
        <div class="match-card">
            <span class="time">17:00</span>
            <span style="font-size:0.8rem">CAFERAĞA S.S</span>
            <span class="tag">U16EB</span>
            <b>BOĞAZİÇİ AKADEMİ (A)</b>
            <b>GALATASARAY (B)</b>
        </div>
    </div>

    <script>
        function filter() {
            let val = document.getElementById('search').value.toUpperCase();
            let cards = document.getElementsByClassName('match-card');
            for(let c of cards) { c.style.display = c.innerText.toUpperCase().includes(val) ? "" : "none"; }
        }
    </script>
</body>
</html>
